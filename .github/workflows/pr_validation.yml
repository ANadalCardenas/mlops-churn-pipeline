# GitHub Actions CI workflow triggered on every pull_request event
# (opened, synchronize, reopened).
#
# Steps:
#   1. Checks out the repo and sets up Python 3.11
#   2. Installs dependencies from requirements.txt
#   3. Pulls versioned data from Cloudflare R2 via DVC
#      (uses R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT_URL secrets)
#   4. Runs pipelines/orchestration.py to train and evaluate the model
#      (uses MLFLOW_TRACKING_URI, MLFLOW_TRACKING_USERNAME,
#       MLFLOW_TRACKING_PASSWORD secrets)
#   5. Posts a markdown metrics table as a comment on the PR
#      (reads train_metrics.json and model_info.json from the CI run output)
#   6. Uploads reports/ci_run/ as a build artifact for download

name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CANDIDATE_DATA_VERSION: v1  # data version trained/built for the PR branch (baseline always uses main's own default)

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # required to post the metrics comment on the PR
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull data with DVC
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCES_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCES_KEY }}
          AWS_S3_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        run: dvc pull

      # ── Train candidate (PR branch) ──────────────────────────────────────
      - name: Train candidate model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          python pipelines/orchestration.py \
            --data-version ${{ env.CANDIDATE_DATA_VERSION }} \
            --experiment-name churn-pr-${{ github.event.pull_request.number }} \
            --run-name candidate-pr-${{ github.event.pull_request.number }} \
            --output-dir reports/candidate \
            --register-model \
            --model-stage Staging

      # ── Train baseline (main branch, separate folder) ────────────────────
      - name: Checkout main for baseline
        uses: actions/checkout@v4
        with:
          ref: main
          path: baseline_repo

      - name: Pull baseline data
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCES_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCES_KEY }}
          AWS_S3_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        run: |
          cd baseline_repo
          dvc pull

      - name: Train baseline model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          cd baseline_repo
          pip install -r requirements.txt -q
          python pipelines/orchestration.py \
            --data-version v1 \
            --experiment-name churn-pr-${{ github.event.pull_request.number }}-baseline \
            --run-name baseline-pr-${{ github.event.pull_request.number }} \
            --output-dir ../reports/baseline

      # ── Compare ──────────────────────────────────────────────────────────
      - name: Compare candidate vs baseline
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python src/evaluation/compare.py \
            --candidate reports/candidate/train_metrics.json \
            --baseline  reports/baseline/train_metrics.json \
            --output-dir reports/ \
            --dagshub-url "${{ secrets.MLFLOW_TRACKING_URI }}"

      - name: Build Docker image
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          REGISTRY_VERSION=$(python -c "import json; d=json.load(open('reports/candidate/model_info.json')); print(d.get('registry_model_version', 'unknown'))")
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          python pipelines/orchestration.py \
            --data-version ${{ env.CANDIDATE_DATA_VERSION }} \
            --output-dir reports/candidate \
            --build-docker-image \
            --image-tag churn-model:${{ env.CANDIDATE_DATA_VERSION }}-staging-${REGISTRY_VERSION}-${SHORT_SHA}

      # ── Post or update PR comment ─────────────────────────────────────────
      - name: Post validation report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('reports/pr_comment.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Churn Model Validation Report')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: reports-pr-${{ github.event.pull_request.number }}
          path: reports/
